name: Windows Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and portable app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build Windows artifacts
        run: npm run dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formula-desktop-memo-windows-${{ github.run_number }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: powershell
        run: |
          $assets = @(
            Get-ChildItem -LiteralPath "release" -File |
              Where-Object { $_.Extension -in ".exe", ".blockmap" } |
              ForEach-Object { $_.FullName }
          )

          if ($assets.Count -eq 0) {
            throw "No release assets were generated."
          }

          $title = "Formula Desktop Memo $env:RELEASE_TAG"
          $notes = @"
          Automated Windows build for $env:RELEASE_TAG.

          Assets:
          - Windows installer: Formula Desktop Memo-Setup-*-x64.exe
          - Portable executable: Formula Desktop Memo-*-x64.exe
          "@

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assets --clobber
          } else {
            gh release create $env:RELEASE_TAG @assets --title $title --notes $notes
          }
